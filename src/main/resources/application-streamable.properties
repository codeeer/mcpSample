# ------------------------------------------------------------------
# 'streamable' profili — MCP transport'unu Streamable HTTP'ye gecirir.
#
# Calistirma:
#   ./mvnw spring-boot:run -Dspring-boot.run.profiles=streamable
#
# Bu profil aktifken:
#   - Tek uc: POST/GET http://localhost:8080/mcp   (Streamable HTTP)
#   - Klasik /sse ucu KAPALI olur (iki transport ayni anda calismaz).
#
# Varsayilan profilde (bu dosya devre disi) klasik HTTP+SSE kullanilir:
#   - GET /sse  +  POST /mcp/message
#
# Diger tum ayarlar (H2, JPA, MCP server adi/tipi) base application.properties'ten gelir.
# ------------------------------------------------------------------
spring.ai.mcp.server.protocol=STREAMABLE
spring.ai.mcp.server.streamable-http.mcp-endpoint=/mcp
