spring.application.name=mcpSample

# ------------------------------------------------------------------
# H2 (in-memory) veritabani
#   - Gercek dis sistem yerine uygulama acilisinda rastgele veri seed edilir.
#   - DB_CLOSE_DELAY=-1: baglanti kapansa bile veriyi JVM yasam suresince tut.
# ------------------------------------------------------------------
spring.datasource.url=jdbc:h2:mem:customer360;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 web konsolu: http://localhost:8080/h2-console  (JDBC URL: jdbc:h2:mem:customer360)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# ------------------------------------------------------------------
# MCP Server (Spring AI) - varsayilan: klasik HTTP+SSE transport
#   - SSE ucu: http://localhost:8080/sse
#   - Mesaj ucu: http://localhost:8080/mcp/message
#
# Streamable HTTP transport icin 'streamable' profilini calistirin:
#   ./mvnw spring-boot:run -Dspring-boot.run.profiles=streamable
#   (bkz. application-streamable.properties; tek uc: /mcp)
# ------------------------------------------------------------------
spring.ai.mcp.server.name=customer360-mcp-server
spring.ai.mcp.server.version=0.0.1
spring.ai.mcp.server.type=SYNC
spring.ai.mcp.server.instructions=Musteri 360 verisine (CRM, siparis, fatura/ERP, destek) erisim saglayan araclar.
